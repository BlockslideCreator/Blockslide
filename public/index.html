<!DOCTYPE html>
<html>
<head>
    <title>Blockslide</title>
    <style>
        body { font-family: Arial; margin: 0; display: flex; height: 100vh; }
        #leftPanel { width: 250px; border-right: 1px solid black; padding: 10px; overflow-y: auto; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #topBar { width: 100%; display: flex; justify-content: space-between; align-items:center; padding:5px; }
        #serverCode { font-weight:bold; text-align:center; flex:1; }
        #leaderboard { width: 200px; border-left: 1px solid black; padding: 10px; }
        canvas { border: 1px solid black; }
        button { margin: 5px 0; }
        #auth, #serverMenu { margin: auto; text-align: center; }
        #popup, #endGamePopup {
            position: fixed;
            background: white;
            border: 1px solid black;
            padding: 10px;
            display: none;
        }
        #endGamePopup { top: 30%; left: 35%; padding: 20px; }
    </style>
</head>
<body>

<div id="auth">
    <h2>Blockslide</h2>
    <input id="username1" placeholder="Username (Display)"><br>
    <input id="username2" placeholder="Password (Don't forget it)"><br>
    <button onclick="createAccount()">Create Account</button>
    <button onclick="login()">Login</button>
    <p id="authMsg"></p>
</div>

<div id="serverMenu" style="display:none;">
    <h3>Create or Join Server</h3>
    <button onclick="createServer()">Create Server</button><br>
    <input id="serverCodeInput" placeholder="Enter 6-digit code"><br>
    <button onclick="joinServer()">Join Server</button>
    <p id="serverMsg"></p>
</div>

<div id="gameUI" style="display:none; width:100%;">
    <div id="leftPanel">
        <h3>Lobby</h3>
        <div id="playerList"></div>
        <button id="startBtn" onclick="startGame()" style="display:none;">Start Game</button>
    </div>

    <div id="main">
        <div id="topBar">
            <div id="serverCode"></div>
            <button onclick="leaveServer()">Leave Server</button>
        </div>
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <div id="gameTimer" style="margin-top:5px; font-weight:bold; text-align:center;">Time: 0</div>
    </div>

    <div id="leaderboard">
        <h3>Leaderboard</h3>
        <div id="leaderboardList"></div>
    </div>
</div>

<div id="popup"></div>

<div id="endGamePopup">
    <h2>Game Over!</h2>
    <div id="endGameResults"></div>
    <button onclick="closeEndGame()">Close</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
